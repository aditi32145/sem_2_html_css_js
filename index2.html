<!DOCTYPE html>
<html>
<head>
    <title>CSS Full Demo</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <!-- Fixed Navbar -->
    <header class="navbar">
        <h1>My Website</h1>
    </header>

    <!-- Sidebar (Position Absolute inside container) -->
    <div class="main-container">

        <aside class="sidebar">
            <p>Menu</p>
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Contact</li>
            </ul>
        </aside>

        <!-- Grid Content -->
        <section class="grid-container">
            <div class="card">Box 1</div>
            <div class="card">Box 2</div>
            <div class="card">Box 3</div>
            <div class="card">Box 4</div>
            <div class="card">Box 5</div>
            <div class="card">Box 6</div>
        </section>

    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 Website</p>
    </footer>

</body>
</html>
