<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <table cellpadding = "12" cellspacing = "0" align = "center" width = "40%" border = "2">
    <caption> <b>TIME TABLE </b></caption>
    <thead>
        <tr>
            <th>Day period</th>
            <th>I</th>
            <th>II</th>
            <th>III</th>
            <th>12:00 - 12: 40</th>
            <th>IV</th>
            <th>V</th>
            <th>VI</th>
            <th>VII</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td><b> Monday</b></td>
            <td>ENG</td>
            <td>MATH</td>
            <td>CHEM</td>
            <td  rowspan = "6" class = "break" align = "center">L <br>U <br>N <br>C <br>H</td>
            <td colspan = "3"  align = "center">LAB</td>
            <td>PHY</td>
        </tr>
        <tr>
            <td><b>Tuesday</b></td>
            <td colspan="3" align = "center">LAB</td>
            <td>ENG</td>
            <td>CHEM</td>
            <td>MATH</td>
            <td>SPORTS</td>
        </tr>
        <tr>
            <td><b>Wednesday</b></td>
            <td>MATH</td>
            <td>PHY</td>
            <td>ENG</td>
            <td>CHEM</td>
            <td colspan ="3" align = "center">LIBRARY</td>
        </tr>
        <tr>
            <td><b>Thursday</b></td>
            <td>PHY</td>
            <td>ENG</td>
            <td>CHEM</td>
            <td colspan= "3" align = "center">LAB</td>
            <td>MATH</td>
        </tr>
        <tr>
            <td><b>Friday</b></td>
            <td colspan = "3" align = "center">LAB</td>
            <td>MATH</td>
            <td>CHEM</td>
            <td>ENG</td>
            <td>PHY</td>
        </tr>
        <tr>
            <td><b>Saturday</b></td>
            <td>ENG</td>
            <td>CHEM</td>
            <td>MATH</td>
            <td colspan = "3" align = "center">SEMINAR</td>
            <td>SPORTS</td>
        </tr>
    </tbody>
    </table>
</body>
</html>
