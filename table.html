<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Table with Rowspan and Colspan</title>
</head>
<body>

<table cellpadding="12" border="3" cellspacing="0" width="80%">
        <caption><b>Student Details Table (rowspan & colspan)</b></caption>

    <thead>
        <tr>
            <th rowspan="2">Name</th>
            <th colspan="3">Details</th>
        </tr>
        <tr>
            <th>Age</th>
            <th>City</th>
            <th>Address</th>
        </tr>
        
    </thead>
    <tbody>
        <tr>
            <td rowspan="2">Rahul</td>
            <td>25</td>
            <td>Kolkata</td>
            <td>Kolkata</td>
        </tr>
        <tr>
            <td>amit</td>
            <td>26</td>
            <td>Delhi</td>
        </tr>
          <tr>
            <td>amit</td>
            <td>26</td>
            <td>Delhi</td>
            <td>Delhi</td>
        </tr>
    </tbody>
    <tfoot>
        <tr>
            <td colspan="4">Total Entries: 2</td>
        </tr>
    </tfoot>
</table>

 <img src="image/image.jpeg" alt="Sample Image" width="300" height="200">

    <figure>
        <img src="image.jpeg" alt="Sample Image" width="300" height="200">
        <figcaption>This is a sample image caption</figcaption>
    </figure>


</body>
</html>
